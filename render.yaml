services:
  - type: web
    name: fraud-detection-api
    runtime: python
    rootDir: career_projects/fraud_detection_api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRAUD_DATASET_PATH
        value: /opt/render/project/src/career_projects/fraud_detection_api/data/creditcard.csv
