<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fraud Detection API</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Fraud Detection API</h1>
      <p>Kaggle credit card fraud scoring with SHAP explainability. Use a sample row or paste JSON for scoring.</p>
    </header>

    <section class="panel actions-row">
      <button id="loadSampleBtn">Load Sample Transaction</button>
      <button id="scoreBtn">Score JSON</button>
    </section>

    <section class="panel grid">
      <div>
        <label for="payload">Transaction payload (JSON)</label>
        <textarea id="payload"></textarea>
      </div>
      <div>
        <label for="csvFile">Optional Kaggle CSV upload</label>
        <input id="csvFile" type="file" accept=".csv" />
        <label for="rowIndex">Row index</label>
        <input id="rowIndex" type="number" min="0" value="0" />
        <button id="scoreCsvBtn">Score Uploaded CSV Row</button>
        <div class="hint">Upload the creditcard.csv file and score a row by index.</div>
      </div>
    </section>

    <section class="panel">
      <h2>Prediction</h2>
      <pre id="result"></pre>
    </section>

    <section class="panel">
      <h2>Top SHAP signals</h2>
      <div id="signals"></div>
    </section>
  </div>
